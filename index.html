<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>йоу</title>
<style>
  :root{
    --bg: #fcf0f9;
    --ink: #281e0a;
    --dim: #6f6a5e;
    --accent: #fe7dca;
  }
  html, body{
    height: 100%;
    margin: 0;
  }
  body{
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Courier New', 'Consolas', monospace;
  }
  .stage{
    max-width: 90vw;
    text-align: center;
    padding: 2rem;
    position: relative;
  }
  .screen{
    display: none;
  }
  .screen.active{
    display: block;
  }
  #text{
    font-size: clamp(1.4rem, 4.5vw, 3rem);
    color: var(--ink);
    letter-spacing: 0.02em;
    font-weight: 1000;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .cursor{
    display: inline-block;
    width: 0.55ch;
    background: var(--accent);
    margin-left: 2px;
    animation: blink 0.9s step-end infinite;
  }
  @keyframes blink{
    0%, 49%{ opacity: 1; }
    50%, 100%{ opacity: 0; }
  }
  .go-btn{
    display: inline-block;
    margin-top: 2.2rem;
    padding: 0.75rem 2rem;
    background: transparent;
    color: var(--accent);
    border-radius: 999px;
    border: 1px solid var(--accent);
    font-family: inherit;
    font-size: 0.95rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.6s ease, transform 0.6s ease, background 0.2s ease, color 0.2s ease;
    pointer-events: none;
  }
  .go-btn.visible{
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  .go-btn:hover{
    background: var(--accent);
    color: var(--bg);
  }
  #text2{
    font-size: clamp(1.4rem, 4.5vw, 3rem);
    color: var(--ink);
    letter-spacing: 0.02em;
    line-height: 1.5;
    opacity: 0;
    transition: opacity 0.8s ease;
  }
  #text2.visible{
    opacity: 1;
  }
  #img2{
    display: block;
    max-width: min(70vw, 480px);
    max-height: 45vh;
    margin: 2rem auto 0;
    border: 1px solid var(--dim);
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  #img2.visible{
    opacity: 1;
    transform: translateY(0);
  }
  .fade-block{
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.8s ease, transform 0.8s ease;
    margin-top: 1.5rem;
  }
  .fade-block:first-child{
    margin-top: 0;
  }
  .fade-block.visible{
    opacity: 1;
    transform: translateY(0);
  }
  #text3a, #text3b{
    font-size: clamp(1.4rem, 4.5vw, 3rem);
    color: var(--ink);
    letter-spacing: 0.02em;
    line-height: 1.5;
  }
  #img3{
    display: block;
    max-width: min(70vw, 480px);
    max-height: 40vh;
    margin-left: auto;
    margin-right: auto;
    border: 1px solid var(--dim);
  }
</style>
</head>
<body>

  <div class="stage">

    <!-- Экран 1: печать по букве -->
    <div id="screen1" class="screen active">
      <div><span id="text"></span><span class="cursor">&nbsp;</span></div>
      <button id="goBtn" class="go-btn">А?</button>
    </div>

    <!-- Экран 2: новый текст, картинка, кнопка "Далее" -->
    <div id="screen2" class="screen">
      <div id="text2"></div>
      <img id="img2" src="sticker.png" alt="">
      <button id="nextBtn" class="go-btn">дальш</button>
    </div>

    <!-- Экран 3: текст, картинка, текст -->
    <div id="screen3" class="screen">
      <div id="text3a" class="fade-block"></div>
      <img id="img3" class="fade-block" src="мимими.jpg" alt="">
      <div id="text3b" class="fade-block"></div>
    </div>

  </div>

<script>
  // ==== НАСТРОЙКИ ====
  const message1   = "Нора..💕";
  const speed      = 70;    // мс между буквами
  const startDelay = 400;   // задержка перед началом печати, мс

  const message2   = "забей короче хуяку на это волонтерство пускай сами себе ккофе поварят, да и вообще все будет круто атвечаю";
  const imageDelay = 2000;  // задержка перед показом картинки после текста, мс
  const btnDelay   = 2000;

  const message3a         = "Все давай люблю тебя котик💕";
  const message3b         = "мимимимими";
  const screen3ImgDelay   = 2000; // задержка перед картинкой после первого текста, мс
  const screen3TextDelay  = 2000; // задержка перед вторым текстом после картинки, мс

  // ==== ЭКРАН 1 ====
  const screen1 = document.getElementById('screen1');
  const screen2 = document.getElementById('screen2');
  const screen3 = document.getElementById('screen3');
  const el   = document.getElementById('text');
  const btn  = document.getElementById('goBtn');

  let timer = null;

  function typeScreen1(){
    clearTimeout(timer);
    screen1.classList.add('active');
    screen2.classList.remove('active');
    screen3.classList.remove('active');

    el.textContent = '';
    btn.classList.remove('visible');
    let i = 0;
    function step(){
      if(i < message1.length){
        el.textContent += message1[i];
        i++;
        timer = setTimeout(step, speed);
      } else {
        btn.classList.add('visible');
      }
    }
    timer = setTimeout(step, startDelay);
  }

  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    goToScreen2();
  });

  // ==== ЭКРАН 2 ====
  const text2 = document.getElementById('text2');
  const img2  = document.getElementById('img2');
  const nextBtn = document.getElementById('nextBtn');

  function goToScreen2(){
    screen1.classList.remove('active');
    screen2.classList.add('active');

    text2.textContent = message2;
    text2.classList.remove('visible');
    img2.classList.remove('visible');
    nextBtn.classList.remove('visible');

    requestAnimationFrame(() => {
      text2.classList.add('visible');
    });

    setTimeout(() => {
      img2.classList.add('visible');
    }, imageDelay);

    setTimeout(() => {
      nextBtn.classList.add('visible');
    }, imageDelay + btnDelay);
  }

  nextBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    goToScreen3();
  });

  // ==== ЭКРАН 3 ====
  const text3a = document.getElementById('text3a');
  const img3   = document.getElementById('img3');
  const text3b = document.getElementById('text3b');

  function goToScreen3(){
    screen2.classList.remove('active');
    screen3.classList.add('active');

    text3a.textContent = message3a;
    text3b.textContent = message3b;
    text3a.classList.remove('visible');
    img3.classList.remove('visible');
    text3b.classList.remove('visible');

    requestAnimationFrame(() => {
      text3a.classList.add('visible');
    });

    setTimeout(() => {
      img3.classList.add('visible');
    }, screen3ImgDelay);

    setTimeout(() => {
      text3b.classList.add('visible');
    }, screen3ImgDelay + screen3TextDelay);
  }

  typeScreen1();
</script>

</body>
</html>
